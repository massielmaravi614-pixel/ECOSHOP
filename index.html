<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoShop | Catálogo Inteligente</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<header class="topbar">
    <div class="brand">
        <span class="logo">🌿</span>
        <div>
            <h1>EcoShop</h1>
            <small>Catálogo Inteligente de Productos</small>
        </div>
    </div>

    <div class="stats-mini">
        <div>
            <span id="total-productos">0</span>
            <small>Productos</small>
        </div>
        <div>
            <span id="valor-inventario">0</span>
            <small>Inventario</small>
        </div>
    </div>
</header>

<!-- ================= CONTROLES ================= -->
<section class="controls">

    <!-- BUSCADOR -->
    <div class="search-box">
        <input 
            type="text" 
            id="input-busqueda" 
            placeholder="🔎 Buscar productos..."
        >
    </div>

    <!-- FILTROS -->
    <div class="filters" id="filtros">
        <button data-categoria="todos" class="active">Todos</button>
        <button data-categoria="hogar">Hogar</button>
        <button data-categoria="tecnología">Tecnología</button>
        <button data-categoria="deportes">Deportes</button>
    </div>

</section>

<!-- ================= MAIN ================= -->
<main class="layout">

    <!-- PRODUCTOS -->
    <section class="products-section">

        <h2>Productos disponibles</h2>

        <div id="grid-productos" class="grid">
            <!-- JS RENDER AQUÍ -->
        </div>

        <!-- EMPTY STATE -->
        <div id="emptyState" class="empty-state">
            🌱 No se encontraron productos
        </div>

    </section>

    <!-- DETALLE -->
    <aside id="detalle-producto" class="detail-panel">

        <h2>Detalle del producto</h2>

        <div id="contenido-detalle" class="detail-content">
            <p>Selecciona un producto para ver detalles</p>
        </div>

    </aside>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>EcoShop © 2026 — Sistema de Gestión de Inventario</p>
</footer>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
